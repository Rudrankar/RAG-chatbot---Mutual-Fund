name: Daily Data Ingestion & Indexing

on:
  schedule:
    - cron: '0 5 * * *'  # 10:30 AM IST (5:00 AM UTC) everyday
  workflow_dispatch:      # Allows manual trigger via GitHub Web UI

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Scraper & Data Ingestion
        run: |
          python backend/scripts/ingest.py
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}

      - name: Commit & Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/raw/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update daily mutual fund data [skip ci]" && git push)
